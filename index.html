<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Underdark Business Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              drow: {
                950: '#0a0310',
                900: '#0f0518',
                800: '#1a0b2e',
                700: '#2d1b4e',
                600: '#4c2a85',
                500: '#6b3bad',
                400: '#8e5cd9',
                300: '#b084f5',
                100: '#e0cfff',
              },
              spider: {
                DEFAULT: '#a3a3a3',
                web: '#2a2a2a',
              }
            },
            fontFamily: {
              serif: ['Georgia', 'Cambria', 'Times New Roman', 'Times', 'serif'],
              sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #e2e8f0;
        background-image: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #050505 70%);
        min-height: 100vh;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0518;
      }
      ::-webkit-scrollbar-thumb {
        background: #4c2a85;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b3bad;
      }
      .glass-panel {
        background: rgba(26, 11, 46, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(142, 92, 217, 0.2);
      }
    </style>
    <!-- PDF.js for parsing PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      // Configure PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- Mammoth.js for parsing Word Docs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  </head>
  <body class="bg-black text-white">
    <div id="root">
      <div id="initial-loading" style="min-height: 100vh; display: flex; flex-col; align-items: center; justify-center; font-family: serif; color: #8e5cd9;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 3px solid #4c2a85; border-top-color: #b084f5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p style="letter-spacing: 0.2em; text-transform: uppercase; font-size: 14px; opacity: 0.8;">Incanalando il potere del Sottosuolo...</p>
        </div>
      </div>
    </div>

    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
      // Early Error Catcher
      window.onerror = function(msg, url, line, col, error) {
        // Ignore benign browser notifications that are not real app errors
        if (typeof msg === 'string' && (
          msg.includes('ResizeObserver loop') ||
          msg.includes('Non-Error promise rejection')
        )) {
          return true;
        }
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 40px; color: #ff6b6b; text-align: center; font-family: serif; background: #0a0310; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">' +
            '<h1 style="text-transform: uppercase; letter-spacing: 3px;">Errore Arcano</h1>' +
            '<p style="color: #8e5cd9; margin-bottom: 20px;">L\'incantesimo di caricamento è fallito.</p>' +
            '<div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; max-width: 80%; overflow: auto;">' + msg + '</div>' +
            '<button onclick="window.location.reload()" style="margin-top: 30px; background: #4c2a85; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold;">Riprova il Rituale</button>' +
            '</div>';
        }
        return false;
      };

      // Catch unhandled promise rejections (not caught by window.onerror)
      window.onunhandledrejection = function(event) {
        var msg = event.reason && (event.reason.message || String(event.reason));
        if (!msg || msg.includes('ResizeObserver') || msg.includes('Non-Error')) return;
        // Only show error screen if React hasn't mounted yet
        var root = document.getElementById('root');
        if (root && root.querySelector('#initial-loading')) {
          window.onerror(msg, '', 0, 0, event.reason);
        }
      };
    </script>

    <script type="module" src="/index.tsx"></script>
  </body>
</html>
